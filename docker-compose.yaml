networks:
  sigmatrack-network:
    driver: bridge

volumes:
  postgres_data:
  sigmatrack_uploads:

services:
  postgres:
    image: postgres:16-alpine
    container_name: sigmatrack-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sigmatrack-network

  backend:
    container_name: sigmatrack-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=${BACKEND_ENV}
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - StorageSettings__LocalStoragePath=/app/uploads
    volumes:
      - sigmatrack_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sigmatrack-network

  frontend:
    container_name: sigmatrack-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile 
    environment:
      - NODE_ENV=production
      - NUXT_PUBLIC_API_BASE=http://localhost
    depends_on:
      - backend
    networks:
      - sigmatrack-network

  nginx:
    image: nginx:alpine
    container_name: sigmatrack-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - sigmatrack_uploads:/var/www/uploads:ro
    depends_on:
      - backend
      - frontend
    networks:
      - sigmatrack-network